name: campsite-os-dev

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: campsite-os-postgres
    restart: unless-stopped
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-campsite}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-campsite_dev_pwd}
      POSTGRES_DB: ${POSTGRES_DB:-campsite_os}
      TZ: Asia/Shanghai
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-campsite} -d ${POSTGRES_DB:-campsite_os}']
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - campsite-os-net

  redis:
    image: redis:7-alpine
    container_name: campsite-os-redis
    restart: unless-stopped
    ports:
      - '${REDIS_PORT:-6379}:6379'
    command:
      [
        'redis-server',
        '--appendonly',
        'yes',
        '--maxmemory',
        '256mb',
        '--maxmemory-policy',
        'allkeys-lru',
      ]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - campsite-os-net

volumes:
  postgres_data:
    name: campsite-os-postgres-data
  redis_data:
    name: campsite-os-redis-data

networks:
  campsite-os-net:
    name: campsite-os-net
    driver: bridge
